<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - EcoWarriors</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <!-- External CSS -->
  <link rel="stylesheet" href="login.css">
</head>
<body>

<nav>
  <a href="index.html" class="brand">♻️ EcoWarriors</a>
  <a href="index.html" class="btn-nav">← Home</a>
</nav>

<div class="page-wrap">
  <div class="page-bg" id="pageBg"></div>

  <div class="auth-card">
    <div class="tab-bar">
      <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">🔑 Login</button>
      <button class="tab-btn" id="registerTab" onclick="switchTab('register')">🌱 Register</button>
    </div>

    <!-- LOGIN -->
    <div class="form-panel active" id="loginPanel">
      <div class="eco-icon">🌍</div>
      <div class="form-title">
        <h2>Welcome Back!</h2>
        <p>Log in to continue your eco journey</p>
      </div>

      <div class="input-group">
        <label>Email or Username</label>
        <div class="input-wrap">
          <span class="icon">📧</span>
          <input type="text" id="loginEmail" placeholder="your@email.com" oninput="clearE(this)">
        </div>
        <div class="field-err" id="eLoginEmail">Please enter your email</div>
      </div>

      <div class="input-group">
        <label>Password</label>
        <div class="input-wrap">
          <span class="icon">🔒</span>
          <input type="password" id="loginPw" placeholder="Your password" oninput="clearE(this)">
        </div>
        <div class="field-err" id="eLoginPw">Please enter your password</div>
      </div>

      <button class="submit-btn" id="loginBtn" onclick="handleLogin()">Login → Play!</button>
    </div>
  </div>
</div>

<footer>
  <div class="footer-brand">♻️ EcoWarriors</div>
  <p>&copy; 2024 EcoWarriors. All rights reserved.</p>
</footer>

<div class="toast" id="toast"></div>

<!-- External JS -->
<script src="login.js"></script>
</body>
</html>
